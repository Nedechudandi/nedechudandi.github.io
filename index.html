<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>నేడే చూడండి - CineSuggest</title>
  <style>
    :root {
      --vintage-cream: #f4e4bc;
      --theatre-red: #9e1b1b;
      --gold: #d4af37;
      --bright-gold: #ffdf00;
      --text-main: #2c1a0a;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', 'Georgia', serif;
      background-color: var(--vintage-cream);
      background-image: url('https://www.transparenttextures.com/patterns/cream-pixels.png');
      color: var(--text-main);
      text-align: center;
      overflow-x: hidden;
    }

    /* --- HEADER --- */
    .header-section { padding: 30px 10px; }
    h1 {
      display: inline-block;
      color: var(--theatre-red);
      font-size: clamp(1.8rem, 8vw, 3.5rem);
      text-transform: uppercase;
      padding: 15px 30px;
      margin: 0;
      background: #fff;
      border: 4px solid var(--theatre-red);
      box-shadow: 0 0 0 4px #fff, 0 0 0 8px var(--gold);
      position: relative;
    }
    h1::before {
      content: "• • • • • • • • • • • • • • • •";
      position: absolute;
      top: -12px; left: 0; width: 100%;
      color: var(--gold); font-size: 20px;
    }

    .sub-title { font-size: 1.2rem; color: #6d4c41; margin-top: 20px; font-weight: bold; }
    .tagline { color: #888; font-size: 0.85rem; margin-top: 5px; padding: 0 10px; }

    /* --- NAVIGATION --- */
    .tabs { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 10px; 
      margin: 20px 10px;
    }
    
    .tab-btn {
      background: #e0cc9f;
      padding: 12px 18px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      border-radius: 4px;
      flex: 1 1 40%; 
      max-width: 200px;
      mask-image: radial-gradient(circle at 0 50%, transparent 8px, black 9px), 
                  radial-gradient(circle at 100% 50%, transparent 8px, black 9px);
    }
    .tab-btn.active { background: #fff; border: 2px solid var(--theatre-red); }

    /* --- CONTROLS --- */
    .controls { 
      padding: 15px; display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto 30px; 
    }
    select, .search-btn {
      padding: 14px; border: 2px solid #a0855b; background: #fff; font-size: 1rem; border-radius: 4px; outline: none;
    }
    .search-btn { background: var(--theatre-red); color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }

    /* --- GRAND WEEKLY SPOTLIGHT --- */
    #spotlightContainer {
      display: none;
      padding: 25px 15px;
      background: radial-gradient(circle, #4a0000 0%, #1a0000 100%);
    }

    .winner-marquee {
      max-width: 900px; /* Wider to accommodate 2 posters */
      margin: 0 auto;
      background: white;
      padding: 20px;
      border: 8px solid var(--gold);
      box-shadow: 0 0 50px rgba(255, 223, 0, 0.4);
      position: relative;
    }

    .winner-marquee::before {
      content: "• • • • • • • • • • • • • • • •";
      position: absolute;
      top: -18px; left: 0; width: 100%;
      color: var(--bright-gold); font-size: 24px;
      animation: blink 1s infinite alternate;
    }
    @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }

    .spotlight-header {
      background: var(--theatre-red); color: white; padding: 10px;
      margin: -20px -20px 20px -20px; font-weight: 900; letter-spacing: 1px;
    }

    .spotlight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .spotlight-item {
      border-bottom: 2px dashed #ddd;
      padding-bottom: 20px;
    }
    @media (min-width: 600px) { .spotlight-item { border-bottom: none; } }

    .winner-poster {
        width: 100%;
        max-height: 50vh;
        object-fit: contain;
        border: 4px solid #fff;
        margin-bottom: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* --- MOVIE LIST --- */
    #result { display: flex; flex-direction: column; gap: 20px; padding: 10px; list-style: none; max-width: 800px; margin: 0 auto; }
    
    .card {
      display: flex; 
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
      cursor: pointer;
    }

    .poster-wrap { flex: 0 0 130px; height: 190px; background: #000; }
    .poster-img { width: 100%; height: 100%; object-fit: cover; }

    .info { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
    .movie-title { font-weight: bold; font-size: 1.1rem; color: var(--text-main); margin: 0; }

    .btn-group { display: flex; gap: 8px; margin-top: 10px; }
    .action-btn {
      flex: 3; background: #fdf2d0; border: 1px solid #a0855b; padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
      clip-path: polygon(5% 0%, 95% 0%, 100% 20%, 100% 80%, 95% 100%, 5% 100%, 0% 80%, 0% 20%);
    }
    .fav-btn { flex: 1; background: #fff; color: var(--theatre-red); border: 1px solid var(--theatre-red); font-size: 1.2rem; display: flex; align-items: center; justify-content: center;}

    /* --- DETAIL BOX --- */
    .detail-box {
      display: none; width: 100%; box-sizing: border-box; padding: 20px; color: white; background: var(--theatre-red);
      border: 5px solid #fff; outline: 3px solid var(--gold); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); font-size: 0.95rem; margin-top: -5px; border-radius: 0 0 8px 8px;
    }
    .detail-box.active { display: block; }
    .label { color: var(--gold); font-weight: bold; display: block; margin-top: 10px; text-transform: uppercase; font-size: 0.75rem; }

    .placeholder-msg { margin-top: 50px; font-style: italic; color: #8d6e63; font-size: 1.1rem; }

    @media (min-width: 600px) {
      .card { flex-direction: column; width: 230px; }
      #result { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .poster-wrap { flex: 0 0 320px; height: 350px; }
      .tab-btn { flex: 0 0 auto; min-width: 120px; }
    }
  </style>
</head>
<body>

  <div class="header-section">
    <h1>నేడే చూడండి</h1>
    <div class="sub-title">వెండితెర వెలుగులు - CineSuggest</div>
    <div class="tagline">నీకు నచ్చిన సినిమా, మా సలహా! | STOP SEARCHING, START WATCHING</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="searchTab" onclick="switchTab('search')">🔍 Search</button>
    <button class="tab-btn" id="spotlightTab" onclick="switchTab('spotlight')">🌟 Spotlight</button>
    <button class="tab-btn" id="favTab" onclick="switchTab('fav')">❤️ Favorites</button>
    <button class="tab-btn" id="watchedTab" onclick="switchTab('watched')">📜 History</button>
  </div>

  <div id="searchControls" class="controls">
    <div style="display:flex; gap:10px;">
      <select id="genre" style="flex:1">
        <option value="">-- Genre --</option>
        <option value="all">All Genres</option>
        <option value="action">Mass Masala</option>
        <option value="drama">Family Drama</option>
        <option value="comedy">Comedy</option>
        <option value="romance">Love story</option>
        <option value="thriller">Thriller</option>
        <option value="horror">Horror</option>
        <option value="series">Web Series</option>
      </select>
      <select id="sortOrder" style="flex:1"><option value="az">A-Z</option><option value="za">Z-A</option></select>
    </div>
    <button class="search-btn" onclick="showMovies(true)">SEARCH / వెతకండి</button>
  </div>

  <div id="spotlightContainer">
    <div id="spotlightContent"></div>
  </div>

  <ul id="result"><div class="placeholder-msg">🍿 Genre Select Chesi 'SEARCH' click cheyandi! 🍿</div></ul>

  <script src="data.js"></script>

  <script>
    const OMDB_API_KEY = "1a4d416a"; 
    let currentMode = 'search';

    // --- MANAGE WEEKLY SPOTLIGHT HERE ---
    // You can add one or multiple names here: ["Movie1", "Movie2"]
    const weeklySpotlightMovieNames = ["The Kerala Story 2 Goes Beyond"]; 

    function switchTab(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(mode + 'Tab').classList.add('active');
      
      document.getElementById('searchControls').style.display = (mode === 'search') ? 'flex' : 'none';
      document.getElementById('spotlightContainer').style.display = (mode === 'spotlight') ? 'block' : 'none';
      
      if(mode === 'spotlight') {
          document.getElementById("result").innerHTML = "";
          renderSpotlight();
      } else if (mode === 'search') {
          document.getElementById("result").innerHTML = `<div class="placeholder-msg">🍿 Genre Select Chesi 'SEARCH' click cheyandi! 🍿</div>`;
      } else {
          showMovies(true);
      }
    }

    function getStore(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
    function toggleStore(name, key) {
      let list = getStore(key);
      if(list.includes(name)) list = list.filter(n => n !== name);
      else list.push(name);
      localStorage.setItem(key, JSON.stringify(list));
      if(currentMode === 'spotlight') renderSpotlight();
      else showMovies(true);
    }

    async function getPoster(name) {
      const cache = localStorage.getItem(`p_${name}`);
      if (cache) return cache;
      try {
        const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&t=${encodeURIComponent(name)}`);
        const data = await res.json();
        if (data.Poster && data.Poster !== "N/A") {
          localStorage.setItem(`p_${name}`, data.Poster);
          return data.Poster;
        }
      } catch (e) {}
      return 'https://via.placeholder.com/500x750?text=No+Poster';
    }

    async function renderSpotlight() {
      const target = document.getElementById("spotlightContent");
      target.innerHTML = `<div class="winner-marquee"><div class="spotlight-header">👑 WEEKLY BLOCKBUSTER 👑</div><div class="spotlight-grid" id="spotlightGrid"></div></div>`;
      const grid = document.getElementById("spotlightGrid");

      for (const name of weeklySpotlightMovieNames) {
        const movie = movies.find(m => m.name === name);
        if(!movie) continue;

        let poster = movie.poster || await getPoster(movie.name);
        const watched = getStore('watchedMovies');
        const favs = getStore('favMovies');
        const isF = favs.includes(movie.name);
        const isW = watched.includes(movie.name);

        const item = document.createElement("div");
        item.className = "spotlight-item";
        item.innerHTML = `
          <img src="${poster}" class="winner-poster">
          <h2 style="color:var(--theatre-red); margin:0;">${movie.name}</h2>
          <p style="font-weight:bold; color:var(--gold); margin: 5px 0 15px;">OTT: ${movie.OTT || 'Theatre'}</p>
          <div class="btn-group" style="margin-bottom:20px; justify-content:center;">
                <button class="action-btn" onclick="toggleStore('${movie.name}', 'watchedMovies')">${isW ? 'REMOVE' : 'WATCHED'}</button>
                <button class="action-btn fav-btn" onclick="toggleStore('${movie.name}', 'favMovies')">${isF ? '❤️' : '🤍'}</button>
          </div>
          <div class="detail-box" style="display:block; text-align:left;">
            <span class="label">Cast</span> ${movie.stars} <span class="label">Synopsis</span> ${movie.synopsis}
          </div>
        `;
        grid.appendChild(item);
      }
    }

    async function showMovies(isManual = false) {
      if (currentMode === 'search' && !isManual) return;
      const container = document.getElementById("result");
      const genre = document.getElementById("genre").value;
      const sort = document.getElementById("sortOrder").value;
      const watched = getStore('watchedMovies');
      const favs = getStore('favMovies');

      let filtered = movies.filter(m => {
        const isW = watched.includes(m.name);
        const isF = favs.includes(m.name);
        if (currentMode === 'search') return !isW && (genre === 'all' || m.genre === genre);
        if (currentMode === 'watched') return isW;
        if (currentMode === 'fav') return isF;
      });

      filtered.sort((a, b) => sort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
      container.innerHTML = filtered.length ? "" : "<div class='placeholder-msg'>ఏమీ దొరకలేదు!</div>";

      for (let m of filtered) {
        let poster = m.poster || await getPoster(m.name);
        const isF = favs.includes(m.name);
        const isW = watched.includes(m.name);
        const item = document.createElement("div");
        item.style.width = "100%";
        item.innerHTML = `
          <li class="card" onclick="this.nextElementSibling.classList.toggle('active')">
            <div class="poster-wrap"><img src="${poster}" class="poster-img"></div>
            <div class="info">
              <div class="movie-title">${m.name}</div>
              <div style="font-size:0.75rem; color:var(--theatre-red); font-weight:bold;">${m.OTT || 'Theatre'}</div>
              <div class="btn-group">
                <button class="action-btn" onclick="event.stopPropagation(); toggleStore('${m.name}', 'watchedMovies')">${isW ? 'REMOVE' : 'WATCHED'}</button>
                <button class="action-btn fav-btn" onclick="event.stopPropagation(); toggleStore('${m.name}', 'favMovies')">${isF ? '❤️' : '🤍'}</button>
              </div>
            </div>
          </li>
          <div class="detail-box">
            <span class="label">Cast</span> ${m.stars} <span class="label">OTT</span> ${m.OTT} <span class="label">Synopsis</span> ${m.synopsis}
          </div>
        `;
        container.appendChild(item);
      }
    }
  </script>
</body>
</html>
